<svg width="100%" height="160" viewBox="0 0 846 160" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .container {
          font-family: 'Segoe UI', Roboto, sans-serif;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          width: 100%;
          height: 160px;
          border-radius: 12px;
          background: linear-gradient(135deg, #1f1c2c, #928dab);
          color: white;
          text-align: center;
          padding: 10px;
          box-shadow: 0 0 20px rgba(0,0,0,0.4);
        }

        .quotes-eng {
          font-size: 20px;
          font-weight: bold;
          background: linear-gradient(90deg, #61dafb, #00ffcc);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          animation: glow 2s infinite alternate;
        }

        .quotes-vi {
          font-size: 16px;
          opacity: 0.9;
          margin-top: 5px;
        }

        .signature {
          font-size: 14px;
          margin-top: 10px;
          opacity: 0.7;
          font-style: italic;
        }

        @keyframes glow {
          from {
            text-shadow: 0 0 5px #61dafb;
          }
          to {
            text-shadow: 0 0 15px #00ffcc;
          }
        }
      </style>

      <div class="container">
        <div class="quotes-eng">
          🚀 "Learn something new every day — don't become yesterday's copy!"
        </div>

        <div class="quotes-vi">
          "Mỗi ngày học một điều mới — đừng trở thành bản sao của ngày hôm qua."
        </div>

        <div class="signature">
          — Hoang Cong Duc | Developer —
        </div>
      </div>
    </div>
  </foreignObject>
</svg>